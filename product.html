    <!-- WATHBA_PRODUCT_DETAILS_DYNAMIC_START -->
    <style id="wathba-product-details-dynamic">
        .wathba-detail-main-image.wathba-image-fallback::after,
        .wathba-related-image.wathba-image-fallback::after,
        .wathba-thumb.wathba-image-fallback::after {
            content: "WATHBA";
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-family: "Anton", sans-serif;
            color: rgba(255, 255, 255, 0.22);
            letter-spacing: 0.08em;
        }

        .wathba-detail-main-image.wathba-image-fallback::after {
            font-size: clamp(42px, 8vw, 92px);
        }

        .wathba-related-image.wathba-image-fallback::after,
        .wathba-thumb.wathba-image-fallback::after {
            font-size: 28px;
        }

        .wathba-size-chip.active {
            background: #ffffff !important;
            color: #000000 !important;
            border-color: #ffffff !important;
        }

        .wathba-thumb.active {
            border-color: #ffffff !important;
        }

        .wathba-thumb.active img {
            opacity: 1 !important;
        }

        .wathba-wa-svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        @media (max-width: 767px) {
            #productDetailsRoot section {
                padding-top: 22px !important;
            }

            #productDetailsRoot h1 {
                font-size: 46px !important;
                line-height: 0.95 !important;
            }

            #productDetailsRoot p {
                font-size: 15px !important;
                line-height: 1.75 !important;
            }

            #productDetailsRoot .wathba-detail-main-image {
                aspect-ratio: 1 / 1 !important;
            }

            #productDetailsRoot .wathba-detail-thumbs {
                gap: 10px !important;
            }

            #productDetailsRoot .wathba-size-row {
                overflow-x: auto;
                flex-wrap: nowrap !important;
                padding-bottom: 8px;
            }

            #productDetailsRoot .wathba-size-chip {
                white-space: nowrap;
            }

            #productDetailsRoot .wathba-order-btn {
                width: 100%;
                font-size: 24px !important;
                padding-top: 18px !important;
                padding-bottom: 18px !important;
            }

            #relatedProductsRoot {
                margin-top: 70px !important;
            }

            #relatedProductsRoot h2 {
                font-size: 42px !important;
                line-height: 1 !important;
            }
        }
    </style>
    <!-- WATHBA_PRODUCT_DETAILS_DYNAMIC_END -->
